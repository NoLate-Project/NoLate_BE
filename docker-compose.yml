version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: late_project_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    env_file:
      - ./docker/mysql/.env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    container_name: late_project_redis
    restart: unless-stopped
    env_file:
      - ./docker/redis/.env
    ports:
      - "${REDIS_PORT}:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: