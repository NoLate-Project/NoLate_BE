spring:
  application:
    name: noLate

  config:
    # 공용 로컬값 다음에 프로젝트 루트의 Git 제외 파일을 읽는다.
    # Docker/운영 환경은 마운트된 /config/env.properties가 마지막에 같은 키를 덮어쓴다.
    # 비밀 파일을 resources 밖에 두어 로컬 빌드 산출물에도 인증키가 포함되지 않게 한다.
    import:
      - optional:file:./src/main/resources/env.properties
      - optional:file:./env.local.properties
      - optional:file:/config/env.properties

  sql:
    init:
      mode: always

  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:p6spy:mysql://${MY_SQL_END_POINT}:${MY_SQL_PORT:3306}/${MY_SQL_DB_NAME}?serverTimezone=Asia/Seoul
    #useSSL=false&serverTimezone=Asia/Seoul
    username: ${MY_SQL_DB_USERNAME}
    password: ${MY_SQL_DB_PASSWORD}

  jpa:
    # 주기적으로 실행되는 스케줄 워커의 정상 쿼리는 출력하지 않는다.
    # SQL 실행 실패 시에는 Hibernate 예외 스택에 실패한 SQL이 포함된다.
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false
        default_batch_fetch_size: 1000
        jdbc:
          time_zone: Asia/Seoul
        hbm2ddl:
          halt_on_error: false
    hibernate:
      ddl-auto: update
    open-in-view: true
  jooq:
    sql-dialect: mysql


logging:
  level:
    # SQL 출력은 P6Spy 에러 리스너 한 곳으로 모아 중복 로그를 피한다.
    org.hibernate.SQL: "OFF"
    org.hibernate.orm.jdbc.bind: "OFF"
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: "OFF"
    p6spy: "OFF"

jwt:
  secret-key: ${JWT_SECRET_KEY}
  #expiration: ${JWT_EXPIRATION}
  issuer: ${JWT_ISSUER}
  access-token-validity-in-seconds: 86400 # 1 day
  refresh-token-validity-in-seconds: 604800 # 7 days


server:
  port: 5522

schedule:
  push:
    fixed-delay-ms: ${SCHEDULE_PUSH_FIXED_DELAY_MS:60000}
    retry-delay-minutes: ${SCHEDULE_PUSH_RETRY_DELAY_MINUTES:5}
    # 푸시 공급자의 일시 장애가 지속될 때 무한 재시도를 막는 작업 단위 한도다.
    max-retry-count: ${SCHEDULE_PUSH_MAX_RETRY_COUNT:3}
    departure-alert-lead-minutes: ${SCHEDULE_PUSH_DEPARTURE_ALERT_LEAD_MINUTES:15}
    departure-reminder-interval-minutes: ${SCHEDULE_PUSH_DEPARTURE_REMINDER_INTERVAL_MINUTES:5}
    departure-snooze-minutes: ${SCHEDULE_PUSH_DEPARTURE_SNOOZE_MINUTES:5}
  traffic:
    tmap:
      enabled: ${TMAP_ENABLED:false}
      app-key: ${TMAP_APP_KEY:}
      base-url: ${TMAP_BASE_URL:https://apis.openapi.sk.com}
  ai:
    # 규칙 파서가 필수 값을 찾지 못했을 때만 사용하는 선택적 AI 보완 설정이다.
    groq:
      enabled: ${GROQ_ENABLED:false}
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:openai/gpt-oss-20b}

routing:
  tmap:
    enabled: ${TMAP_ENABLED:false}
    app-key: ${TMAP_APP_KEY:}
    base-url: ${TMAP_BASE_URL:https://apis.openapi.sk.com}

transit:
  seoul:
    api-key: ${SEOUL_OPENAPI_KEY:}
    subway-api-key: ${SEOUL_SUBWAY_API_KEY:}
    bus-api-key: ${SEOUL_BUS_API_KEY:}
    subway-base-url: ${SEOUL_SUBWAY_BASE_URL:http://swopenAPI.seoul.go.kr/api/subway}
    bus-base-url: ${SEOUL_BUS_BASE_URL:http://ws.bus.go.kr/api/rest}
  tago:
    api-key: ${TAGO_API_KEY:}
    bus-api-key: ${TAGO_BUS_API_KEY:${TAGO_API_KEY:}}
    base-url: ${TAGO_BASE_URL:https://apis.data.go.kr/1613000}
    city-codes: ${TAGO_BUS_CITY_CODES:}

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  project-id: ${FIREBASE_PROJECT_ID:}
