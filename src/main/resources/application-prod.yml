spring:
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      # Flyway 없이 엔티티 정의를 기준으로 운영 스키마를 동기화한다.
      ddl-auto: update
    open-in-view: false

# 운영 API 계약과 내부 모델을 공개하지 않는다. 개발/테스트 프로필의 Swagger는 유지한다.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

schedule:
  push:
    enabled: true

# 외부 경로 공급자는 키를 명시한 운영 환경에서만 활성화한다.
# 키가 없는 배포도 앱 전체를 중단하지 않고, 경로 요청에서 공급자 미설정으로 응답한다.
routing:
  tmap:
    enabled: ${TMAP_ENABLED:false}
firebase:
  enabled: ${FIREBASE_ENABLED:true}
