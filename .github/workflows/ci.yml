name: NoLate BE CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: be-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew --no-daemon clean test bootWar
      - name: Verify WAR contains no credential files
        run: |
          WAR_FILE="$(find build/libs -name '*.war' ! -name '*plain*' | head -n 1)"
          if jar tf "$WAR_FILE" | grep -Eiq '(^|/)(env\.properties|.*firebase-admin.*\.json|.*service-account.*\.json|.*serviceAccount.*\.json)$'; then
            echo "Credential-like file found in packaged WAR."
            exit 1
          fi
      - run: docker build --tag nolate-be-ci:${{ github.sha }} .
